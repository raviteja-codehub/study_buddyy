services:
  - type: web
    name: study-buddy-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: MONGODB_URI
        sync: false

  - type: static
    name: study-buddy-frontend
    buildCommand: npm install && npm run build
    staticPublishPath: frontend/dist
    rootDir: frontend
    envVars:
      - key: VITE_BACKEND_URL
        value: https://study-buddy-backend.onrender.com
